<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Messages Admin</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      background: linear-gradient(to right, #f59e0b, #ef4444);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stats {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .stat-card {
      flex: 1;
      min-width: 200px;
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.2);
      padding: 20px;
      border-radius: 12px;
    }

    .stat-card h3 {
      font-size: 0.875rem;
      color: #94a3b8;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stat-card p {
      font-size: 2rem;
      font-weight: bold;
      color: #f59e0b;
    }

    .login-form {
      max-width: 400px;
      margin: 100px auto;
      background: rgba(255, 255, 255, 0.05);
      padding: 40px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .login-form h2 {
      margin-bottom: 20px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #cbd5e1;
      font-size: 0.875rem;
    }

    input[type="password"] {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      font-size: 1rem;
    }

    input[type="password"]:focus {
      outline: none;
      border-color: #f59e0b;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #f59e0b;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    button:hover {
      background: #d97706;
      transform: translateY(-2px);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .contacts-grid {
      display: grid;
      gap: 20px;
    }

    .contact-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 24px;
      transition: all 0.3s;
    }

    .contact-card:hover {
      border-color: rgba(245, 158, 11, 0.5);
      transform: translateY(-2px);
    }

    .contact-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .contact-info h3 {
      font-size: 1.25rem;
      margin-bottom: 4px;
      color: #f59e0b;
    }

    .contact-email {
      color: #94a3b8;
      font-size: 0.875rem;
    }

    .contact-date {
      color: #64748b;
      font-size: 0.875rem;
    }

    .contact-message {
      background: rgba(0, 0, 0, 0.3);
      padding: 16px;
      border-radius: 8px;
      border-left: 3px solid #f59e0b;
      margin-top: 12px;
      line-height: 1.6;
      color: #e2e8f0;
    }

    .error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      text-align: center;
    }

    .loading {
      text-align: center;
      padding: 40px;
      font-size: 1.125rem;
      color: #94a3b8;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #64748b;
    }

    .empty-state svg {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      opacity: 0.5;
    }

    .logout-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 8px 16px;
      background: rgba(239, 68, 68, 0.2);
      color: #fca5a5;
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.875rem;
      width: auto;
    }

    .logout-btn:hover {
      background: rgba(239, 68, 68, 0.3);
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 1.75rem;
      }

      .stats {
        flex-direction: column;
      }

      .logout-btn {
        position: static;
        margin-top: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Login Form (shown by default) -->
    <div id="loginSection">
      <div class="login-form">
        <h2>🔐 Admin Login</h2>
        <p style="text-align: center; color: #94a3b8; margin-bottom: 20px; font-size: 0.875rem;">
          Enter your admin password to view contact messages
        </p>
        <div id="loginError" class="error" style="display: none;"></div>
        <form id="loginForm">
          <div class="form-group">
            <label for="password">Password</label>
            <input 
              type="password" 
              id="password" 
              name="password" 
              placeholder="Enter admin password"
              required
              autocomplete="current-password"
            >
          </div>
          <button type="submit" id="loginBtn">Login</button>
        </form>
      </div>
    </div>

    <!-- Admin Dashboard (hidden by default) -->
    <div id="dashboardSection" style="display: none;">
      <button class="logout-btn" onclick="logout()">Logout</button>
      
      <header>
        <h1>📬 Contact Messages</h1>
        <p style="color: #94a3b8;">View and manage all contact form submissions</p>
      </header>

      <div class="stats">
        <div class="stat-card">
          <h3>Total Messages</h3>
          <p id="totalCount">-</p>
        </div>
        <div class="stat-card">
          <h3>Today</h3>
          <p id="todayCount">-</p>
        </div>
        <div class="stat-card">
          <h3>This Week</h3>
          <p id="weekCount">-</p>
        </div>
      </div>

      <div id="contactsContainer">
        <div class="loading">Loading messages...</div>
      </div>
    </div>
  </div>

  <script>
    let authToken = sessionStorage.getItem('adminToken');

    // Check if already logged in
    if (authToken) {
      showDashboard();
    }

    // Login form handler
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const loginBtn = document.getElementById('loginBtn');
      const errorDiv = document.getElementById('loginError');

      loginBtn.disabled = true;
      loginBtn.textContent = 'Logging in...';
      errorDiv.style.display = 'none';

      try {
        // Try to fetch contacts with this password
        const response = await fetch('/api/get-contacts', {
          headers: {
            'Authorization': `Bearer ${password}`
          }
        });

        if (response.ok) {
          // Save token and show dashboard
          authToken = password;
          sessionStorage.setItem('adminToken', password);
          showDashboard();
        } else {
          errorDiv.textContent = '❌ Invalid password. Please try again.';
          errorDiv.style.display = 'block';
        }
      } catch (error) {
        errorDiv.textContent = '❌ Network error. Please check your connection.';
        errorDiv.style.display = 'block';
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = 'Login';
        document.getElementById('password').value = '';
      }
    });

    function showDashboard() {
      document.getElementById('loginSection').style.display = 'none';
      document.getElementById('dashboardSection').style.display = 'block';
      loadContacts();
    }

    function logout() {
      sessionStorage.removeItem('adminToken');
      authToken = null;
      document.getElementById('loginSection').style.display = 'block';
      document.getElementById('dashboardSection').style.display = 'none';
    }

    async function loadContacts() {
      const container = document.getElementById('contactsContainer');
      
      try {
        const response = await fetch('/api/get-contacts', {
          headers: {
            'Authorization': `Bearer ${authToken}`
          }
        });

        if (!response.ok) {
          if (response.status === 401) {
            logout();
            return;
          }
          throw new Error('Failed to load contacts');
        }

        const data = await response.json();
        const contacts = data.contacts || [];

        // Update stats
        document.getElementById('totalCount').textContent = contacts.length;
        
        const today = new Date().toDateString();
        const todayCount = contacts.filter(c => 
          new Date(c.created_at).toDateString() === today
        ).length;
        document.getElementById('todayCount').textContent = todayCount;

        const weekAgo = new Date();
        weekAgo.setDate(weekAgo.getDate() - 7);
        const weekCount = contacts.filter(c => 
          new Date(c.created_at) > weekAgo
        ).length;
        document.getElementById('weekCount').textContent = weekCount;

        // Display contacts
        if (contacts.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
              </svg>
              <h3 style="font-size: 1.5rem; margin-bottom: 8px;">No messages yet</h3>
              <p>Contact form submissions will appear here</p>
            </div>
          `;
        } else {
          container.innerHTML = `
            <div class="contacts-grid">
              ${contacts.map(contact => `
                <div class="contact-card">
                  <div class="contact-header">
                    <div class="contact-info">
                      <h3>${escapeHtml(contact.name)}</h3>
                      <p class="contact-email">
                        <a href="mailto:${escapeHtml(contact.email)}" style="color: inherit; text-decoration: none;">
                          📧 ${escapeHtml(contact.email)}
                        </a>
                      </p>
                    </div>
                    <div class="contact-date">
                      ${formatDate(contact.created_at)}
                    </div>
                  </div>
                  <div class="contact-message">
                    ${escapeHtml(contact.message).replace(/\n/g, '<br>')}
                  </div>
                </div>
              `).join('')}
            </div>
          `;
        }
      } catch (error) {
        container.innerHTML = `
          <div class="error">
            Failed to load contacts. Please refresh the page and try again.
          </div>
        `;
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatDate(dateString) {
      const date = new Date(dateString);
      const now = new Date();
      const diffMs = now - date;
      const diffMins = Math.floor(diffMs / 60000);
      const diffHours = Math.floor(diffMs / 3600000);
      const diffDays = Math.floor(diffMs / 86400000);

      if (diffMins < 1) return 'Just now';
      if (diffMins < 60) return `${diffMins} min${diffMins > 1 ? 's' : ''} ago`;
      if (diffHours < 24) return `${diffHours} hour${diffHours > 1 ? 's' : ''} ago`;
      if (diffDays < 7) return `${diffDays} day${diffDays > 1 ? 's' : ''} ago`;
      
      return date.toLocaleDateString('en-US', { 
        year: 'numeric', 
        month: 'short', 
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    // Auto-refresh every 30 seconds if on dashboard
    setInterval(() => {
      if (authToken && document.getElementById('dashboardSection').style.display !== 'none') {
        loadContacts();
      }
    }, 30000);
  </script>
</body>
</html>
